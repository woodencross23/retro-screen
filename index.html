<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.U.C.K.U.P Mainframe v2.1 Terminal Edition</title>
<style>
html,body{height:100%;margin:0;background:#000;color:#00e040;font-family:"Courier New",monospace;font-size:22px;line-height:1.6}
#screen{padding:32px 40px;white-space:pre-wrap}
#hiddenInput{position:absolute;left:-9999px;opacity:0}
@keyframes blink{50%{opacity:0}}
.cursor{animation:blink 1s step-end infinite}
</style>
</head>
<body>
<input id="hiddenInput" type="text" autocapitalize="off" autocomplete="off" spellcheck="false">
<div id="screen"></div>

<script>
const screen=document.getElementById('screen');
const hidden=document.getElementById('hiddenInput');

let history=[],historyPos=0,current='';

function focusInput(){hidden.focus();}
document.addEventListener('click',focusInput);

function rebootSequence(){
screen.textContent='--- Chiquita Client v1.8.2 ---\n\nHandshake to mainframe... OK\nInitializing remote session...';
setTimeout(()=>screen.textContent+='\n\n[Connection established]',1500);
setTimeout(()=>screen.textContent+='\nMainboard............... Supermicro X13QH-T  OK',2500);
setTimeout(()=>screen.textContent+='\nCPU..................... 4x Xeon Platinum OK',3000);
setTimeout(()=>screen.textContent+='\nMemory.................. 12 TB ECC OK',3500);
setTimeout(()=>screen.textContent+='\nGPU Cluster............. 4x NVIDIA L40S OK',4000);
setTimeout(()=>screen.textContent+='\nStorage Pool............ 8.4 PB NVMe OK',4500);
setTimeout(()=>screen.textContent+='\nPower Draw.............. '+(9.3+Math.random()*5.6).toFixed(1)+' kW OK',5000);
setTimeout(showTerminal,6500);
}

function menuText(){
return `--- F.U.C.K.U.P Mainframe v2.1 ---

Choose your machine:

1. Win11 shooter gaming (low ping)
2. Win11 graphics gaming (max GPU)
3. Win11 average use
4. MacOS cutting/editing
5. Linux arch
6. Linux debian
7. Linux tails
8. UniFiUI maintenance
9. Reboot client

client1337@mainframe:~# ${current}_`;
}

function showTerminal(){screen.textContent=menuText();}

function render(){screen.textContent=menuText();}

function loading(name){
let p=0;
const t=setInterval(()=>{
p+=5;
const bar='['+'='.repeat(p/5)+' '.repeat(20-p/5)+']';
screen.textContent='Loading '+name+'\n\n'+bar;
if(p>=100){clearInterval(t);setTimeout(render,500);}
},120);
}

function holyCow(){
screen.textContent=`*** HOLY COW ***

Moooo!

                          /|                        /|
                          | \\           __ _ _     / ;
                    ___    \\ \\   _.-"-" ~"\\  "--' /
                _.-'   ""-._\\ ""   ._,"  ; "--._./
            _.-'       \\./    "-""", )  ~"  |
           / ,- .'          ,     '  o.  ;  )
           \\ ;/       '                 ;   /
            |/        '      |      \\   '   |
            /        |             J."\\  ,  |
           "         :       \\   .'  : | ,. _)
           |         |     /     f |  |--"--'
            \\_        \\    \\    / _/  |
             \\ "-._  _.|   (   j/; -'/
              \\  | "/  (   |   /,    |
               | \\  |  /\\  |\\_///   /
               \\ /   \\ | \\  \\  /   /
                ||    \\ \\|  |  |  |
                ||     \\ \\  |  | /
                |\\      |_|/   ||
                L \\       ||   ||
                "'"       |\\   |\\
                          ( \\. \\ .
                          |_ _\\|_ _\\
                            "    "`;
setTimeout(render,8000);
}

function infoScreen(){
let sec=15;
function draw(msg=''){
screen.textContent='--- Contact Information ---\n\nroot@helpix.de\n\n[C] Copy email to clipboard\n\n'+msg+'\nReturning to main menu in: '+sec;
}
draw('');

function copyHandler(e){
if(e.key.toLowerCase()==='c'){
try{
if(navigator.clipboard && navigator.clipboard.writeText){
navigator.clipboard.writeText('root@helpix.de');
}else{
const ta=document.createElement('textarea');
ta.value='root@helpix.de';
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
}
draw('Email copied to clipboard.\n');
}catch(err){draw('Clipboard unavailable.\n');}
}
}
document.addEventListener('keydown',copyHandler);

const timer=setInterval(()=>{
sec--;
draw('');
if(sec<=0){
clearInterval(timer);
document.removeEventListener('keydown',copyHandler);
render();
}
},1000);
}

function execute(cmd){
history.push(cmd); historyPos=history.length;

if(
   cmd==='10' ||
   cmd==='I' ||
   cmd==='i' ||
   cmd.toLowerCase()==='info'
){infoScreen();return;}
if(cmd===':wq'){holyCow();return;}
if(cmd==='9'||cmd.toLowerCase()==='reboot'){rebootSequence();return;}
if(/^[1-8]$/.test(cmd)){loading('selected machine');return;}
render();
}

document.addEventListener('keydown',e=>{
if(screen.textContent.includes('Contact Information')) return;

if(e.key==='Enter'){const cmd=current.trim(); current=''; execute(cmd); return;}
if(e.key==='Backspace'){current=current.slice(0,-1); render(); return;}
if(e.key==='ArrowUp'){if(historyPos>0)historyPos--; current=history[historyPos]||''; render(); return;}
if(e.key==='ArrowDown'){if(historyPos<history.length-1)historyPos++; current=history[historyPos]||''; render(); return;}
if(e.key.length===1){current+=e.key; render();}
});

focusInput();
rebootSequence();
</script>
</body>
</html>
