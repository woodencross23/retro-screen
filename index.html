<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="wooden (root@localhost:~#) - Solving problems since C64 BASIC. Physics, Linux and a healthy distrust of rebooting." />
<title>F.U.C.K.U.P Mainframe v2.4 Terminal Edition</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    background: #000;
    color: #00e040;
    font-family: "Courier New", monospace;
    font-size: 22px;
    line-height: 1.15;
}
#screen {
    padding: 32px 40px;
    white-space: pre-wrap;
}
#hiddenInput {
    position: absolute;
    left: -9999px;
    opacity: 0;
}
</style>
</head>
<body>
<input id="hiddenInput" type="text" autocapitalize="off" autocomplete="off" spellcheck="false">
<div id="screen"></div>

<script>
const screen=document.getElementById('screen');
const hidden=document.getElementById('hiddenInput');

let history=[],historyPos=0,current='';
let inputLocked=false;

const commands={
"rm -rf *":`Nice try.

Filesystem is read-only.
Your actions have been reported to the cow.`,
"rm -rf /":`Segmentation fault.
Cow dumped.`,
"uptime":`Born: late 1970s
First computer: C64 (1984)
Current OS: debian linux
Status: still debugging`,
"help":`Welcome to linux: there's no help, just endless man pages and your despair.`,
"logout":`Deckard Cain wants you to stay awhile and listen.`,
"exit":`Deckard Cain wants you to stay awhile and listen.`,
"man":`You don't need this.`
};

const sudoText=`[sudo] password for client1337: 
Nice try. This terminal runs on trust issues, not sudoers.`;

const fortunes=[
"You will soon encounter a kernel panic. Or lunch. Hard to tell.",
"A watched process never reboots faster.",
"Beware of the IT guy bearing 'quick fixes'.",
"Your uptime will outlast your patience.",
"Init 0 is not a personality, but it's a start.",
"The cow says: invest in ECC RAM.",
"You will fix one bug and create two. Standard exchange rate.",
"root is calling from inside the house.",
"Confucius says: he who reboots first, loses the argument.",
"A clean log is a lying log."
];

function commandOutput(cmd,text){
screen.textContent=`--- F.U.C.K.U.P Mainframe v2.4 ---

Choose your machine:

1. Win11 shooter (low ping)
2. Win11 graphics (max GPU)
3. Win11 average use
4. MacOS cutting/editing
5. Linux arch
6. Linux debian
7. Linux tails
8. UniFiUI maintenance
9. Reboot client

client1337@mainframe:~# ${cmd}

${text}

client1337@mainframe:~# _`;
}

function fortuneOutput(cmd){
const pick=fortunes[Math.floor(Math.random()*fortunes.length)];
commandOutput(cmd,pick);
}


function focusInput(){hidden.focus();}
document.addEventListener('click',focusInput);

function slTrain(){
inputLocked=true;
const train=[
"      ====        ________                ___________ ",
"  _D _|  |_______/        \\__I_I_____===__|_________| ",
"   |(_)---  |   H\\________/ |   |        =|___ ___|   ",
"   /     |  |   H  |  |     |   |         ||_| |_||   ",
"  |      |  |   H  |__--------------------| [___] |   ",
"  | ________|___H__/__|_____/[][]~\\_______|       |   ",
"  |/ |   |-----------I_____I [][] []  D   |=======|__ "
];
let pos=20;
const frame=train.map(l=>' '.repeat(Math.max(pos,0))+l).join('\n');
screen.textContent=frame;
const t=setInterval(()=>{
pos-=2;
if(pos< -60){clearInterval(t);inputLocked=false;render();return;}
screen.textContent=train.map(l=>' '.repeat(Math.max(pos,0))+l).join('\n');
},60);
}

function matrixRain(){
inputLocked=true;
const cols=40,rows=18;
const chars='01アイウエオカキクケコサシスセソ';
const drops=Array(cols).fill(0).map(()=>Math.floor(Math.random()*rows));
let ticks=0;
const t=setInterval(()=>{
ticks++;
let out='';
for(let r=0;r<rows;r++){
let line='';
for(let c=0;c<cols;c++){
line+= (drops[c]===r) ? chars[Math.floor(Math.random()*chars.length)] : (Math.random()<0.02?chars[Math.floor(Math.random()*chars.length)]:' ');
}
out+=line+'\n';
}
screen.textContent=out;
for(let c=0;c<cols;c++){drops[c]=(drops[c]+1+Math.floor(Math.random()*2))%rows;}
if(ticks>=70){clearInterval(t);inputLocked=false;render();}
},60);
}

function rebootSequence(){
inputLocked=true;
screen.textContent='--- Chiquita Client v1.9.5 ---\n\nHandshake to mainframe... OK\nInitializing remote session...';
setTimeout(()=>screen.textContent+='\n\n[Connection established]',1500);
setTimeout(()=>screen.textContent+='\nMainboard............... Supermicro X13QH-T  OK',2500);
setTimeout(()=>screen.textContent+='\nCPU..................... 4x Xeon Platinum OK',3000);
setTimeout(()=>screen.textContent+='\nMemory.................. 12 TB ECC OK',3500);
setTimeout(()=>screen.textContent+='\nGPU Cluster............. 4x NVIDIA L40S OK',4000);
setTimeout(()=>screen.textContent+='\nStorage Pool............ 8.4 PB NVMe OK',4500);
setTimeout(()=>screen.textContent+='\nPower Draw.............. '+(9.3+Math.random()*5.6).toFixed(1)+' kW OK',5000);
setTimeout(()=>{inputLocked=false;showTerminal();},7700);
}

function menuText(){
return `--- F.U.C.K.U.P Mainframe v2.4 ---

Choose your machine:

1. Win11 shooter (low ping)
2. Win11 graphics (max GPU)
3. Win11 average use
4. MacOS cutting/editing
5. Linux arch
6. Linux debian
7. Linux tails
8. UniFiUI maintenance
9. Reboot client

client1337@mainframe:~# ${current}_`;
}

function showTerminal(){screen.textContent=menuText();}

function render(){screen.textContent=menuText();}

function loading(name){
inputLocked=true;
let p=0;
const t=setInterval(()=>{
p+=5;
const bar='['+'='.repeat(p/5)+' '.repeat(20-p/5)+']';
screen.textContent='Loading '+name+'\n\n'+bar;
if(p>=100){clearInterval(t);setTimeout(()=>{inputLocked=false;render();},500);}
},120);
}

function holyCow(){
screen.textContent=`*** HOLY COW ***

Moooo!

                          /|                        /|
                          | \\           __ _ _     / ;
                    ___    \\ \\   _.-"-" ~"\\  "--' /
                _.-'   ""-._\\ ""   ._,"  ; "--._./
            _.-'       \\./    "-""", )  ~"  |
           / ,- .'          ,     '  o.  ;  )
           \\ ;/       '                 ;   /
            |/        '      |      \\   '   |
            /        |             J."\\  ,  |
           "         :       \\   .'  : | ,. _)
           |         |     /     f |  |--"--'
            \\_        \\    \\    / _/  |
             \\ "-._  _.|   (   j/; -'/
              \\  | "/  (   |   /,    |
               | \\  |  /\\  |\\_///   /
               \\ /   \\ | \\  \\  /   /
                ||    \\ \\|  |  |  |
                ||     \\ \\  |  | /
                |\\      |_|/   ||
                L \\       ||   ||
                "'"       |\\   |\\
                          ( \\. \\ .
                          |_ _\\|_ _\\
                            "    "`;
setTimeout(render,8000);
}

function cowsayOutput(text){
const msg=text&&text.trim()?text.trim():'Moo.';
const maxLen=40;
const lines=[];
let line='';
msg.split(' ').forEach(word=>{
if((line+' '+word).trim().length>maxLen){lines.push(line.trim());line=word;}
else{line=(line+' '+word).trim();}
});
if(line)lines.push(line);

const width=Math.max(...lines.map(l=>l.length));
const top=' '+'_'.repeat(width+2);
const bottom=' '+'-'.repeat(width+2);
const body=lines.map((l,i)=>{
const pad=l+' '.repeat(width-l.length);
const left=lines.length===1?'<':(i===0?'/':(i===lines.length-1?'\\':'|'));
const right=lines.length===1?'>':(i===0?'\\':(i===lines.length-1?'/':'|'));
return left+' '+pad+' '+right;
}).join('\n');

const cow=`
        \\   ^__^
         \\  (oo)\\_______
            (__)\\       )\\/\\
                ||----w |
                ||     ||`;

commandOutput('cowsay '+msg, top+'\n'+body+'\n'+bottom+cow);
}

let infoActive=false;

function infoScreen(){
infoActive=true;
hidden.value='';
current='';
let sec=15;
let status='';

function draw(){
screen.textContent='- Contact Information -\n\nroot@helpix.de\n\n[C] Copy email to clipboard\n\n'+status+'\nReturning to main menu in: '+sec;
}

function closeInfo(){
infoActive=false;
document.removeEventListener('keydown', copyHandler, true);
render();
focusInput();
}

function copyHandler(e){
if(!infoActive) return;
e.stopPropagation();
e.preventDefault();

if(e.key && e.key.toLowerCase()==='c'){
try{
if(navigator.clipboard && navigator.clipboard.writeText){
navigator.clipboard.writeText('root@helpix.de');
}else{
const ta=document.createElement('textarea');
ta.value='root@helpix.de';
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
}
status='Email copied to clipboard.';
draw();
}catch(err){
status='Clipboard unavailable.';
draw();
}
}
}

document.addEventListener('keydown', copyHandler, true);
draw();

const timer=setInterval(()=>{
if(!infoActive){ clearInterval(timer); return; }
sec--;
draw();
if(sec<=0){
clearInterval(timer);
closeInfo();
}
},1000);
}

function execute(cmd){
history.push(cmd);
if(history.length>50){history.shift();}
historyPos=history.length;

if(
   cmd==='10' ||
   cmd==='I' ||
   cmd==='i' ||
   cmd.toLowerCase()==='info'
){infoScreen();return;}
const normalized=cmd.trim().toLowerCase();
if(commands[normalized]){
commandOutput(cmd,commands[normalized]);
return;
}

if(cmd===':wq'){holyCow();return;}
if(cmd==='9'||cmd.toLowerCase()==='reboot'){rebootSequence();return;}
if(/^[1-8]$/.test(cmd)){loading('selected machine');return;}

if(normalized==='sl'){slTrain();return;}
if(normalized==='matrix'){matrixRain();return;}
if(normalized==='fortune'){fortuneOutput(cmd);return;}
if(/^sudo(\s+.*)?$/i.test(cmd.trim())){commandOutput(cmd,sudoText);return;}
if(/^cowsay(\s+|$)/i.test(cmd.trim())){
const text=cmd.trim().replace(/^cowsay\s*/i,'');
cowsayOutput(text);
return;
}

render();
}


hidden.addEventListener('input', ()=>{
  if(infoActive || inputLocked){
    hidden.value='';
    return;
  }
  current = hidden.value;
  render();
});

hidden.addEventListener('keydown', (e)=>{
  if(inputLocked){ e.preventDefault(); return; }
  if(e.key==='Enter'){
    e.preventDefault();
    const cmd = hidden.value.trim();
    hidden.value='';
    current='';
    execute(cmd);
    return;
  }
});


document.addEventListener('keydown',e=>{
if(document.activeElement===hidden && e.key==='Enter') return;
if(infoActive || inputLocked) return;

if(e.key==='Enter'){const cmd=current.trim(); current=''; execute(cmd); return;}
if(e.key==='Backspace'){current=current.slice(0,-1); render(); return;}
if(e.key==='ArrowUp'){if(historyPos>0)historyPos--; current=history[historyPos]||''; render(); return;}
if(e.key==='ArrowDown'){if(historyPos<history.length-1)historyPos++; current=history[historyPos]||''; render(); return;}
if(e.key.length===1){current+=e.key; render();}
});

focusInput();
rebootSequence();
</script>
</body>
</html>
